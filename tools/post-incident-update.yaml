# claude-agent-sdk loader shape. Outgoing PII is stripped by the bound SRS policy.
name: post-incident-update
description: Post an update to the incident channel (Slack)
parameters:
  type: object
  properties:
    channel:
      type: string
      description: Slack channel id or name
    text:
      type: string
      description: The update text
  required: [channel, text]
implementation:
  script:
    command: python3
    args: ["tools/scripts/post-incident-update.py"]
    timeout_ms: 15000
