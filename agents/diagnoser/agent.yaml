spec_version: "0.1.0"
name: diagnoser
version: "1.0.0"
description: Tests a single incident hypothesis using read-only diagnostics + knowledge.
model:
  preferred: claude-sonnet-4-6   # bare id — claude-agent-sdk has no provider prefix
runtime:
  max_turns: 12
# tools omitted on purpose: the sub-agent inherits the parent's tools
# (nrql-query + GitHub MCP). Listing GAP short names here wouldn't match the
# registered mcp__gap_tools__* names. The top-level HITL gate still applies.
compliance:
  risk_tier: medium
  supervision:
    human_in_the_loop: none
