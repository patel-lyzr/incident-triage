description: Writes the incident-channel summary from collected findings.
model: claude-haiku-4-5-20251001
tools: []
disallowed_tools: [mcp__gap_tools__nrql-query]
prompt: |
  Write a crisp incident-channel update from the findings you are given: what's
  impacted, what we know (with evidence — NRQL numbers + the suspect PR), what
  we're doing next, and who will be paged. Never include customer PII. 5 sentences max.
